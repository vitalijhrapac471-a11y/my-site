<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій перший сайт</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
        }

        header {
            background: #2d89ef;
            color: white;
            padding: 30px 20px;
        }

        main {
            padding: 40px 20px;
        }

        .card {
            background: white;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
        }

        h2 {
            color: #2d89ef;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Мій перший сайт</h1>
        <p>Практична робота: Розміщення сайту на сервері</p>
    </header>

    <main>
        <div class="card">
            <h2>Про мене</h2>
            <p>Мене звати Віталій.</p>
            <p>Я навчаюся створювати вебсайти та розміщувати їх в інтернеті.</p>
            <p>Я (vitaliy) створив цей сайт у HTML та розмістив його на GitHub Pages.</p>
        </div>
    </main>

    <footer>
        <p>Храпач Віталій, 2026</p>
    </footer>

</body>
</html>
